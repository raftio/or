services:
  postgres:
    image: postgres:16-alpine
    container_name: orqestra-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: orqestra
      POSTGRES_PASSWORD: orqestra
      POSTGRES_DB: orqestra
    ports:
      - "5432:5432"
    volumes:
      - orqestra_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orqestra -d orqestra"]
      interval: 3s
      timeout: 3s
      retries: 5

volumes:
  orqestra_pgdata:
