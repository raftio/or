services:
  postgres:
    image: postgres:16-alpine
    container_name: orca-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: orca
      POSTGRES_PASSWORD: orca
      POSTGRES_DB: orca
    ports:
      - "5432:5432"
    volumes:
      - orca_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orca -d orca"]
      interval: 3s
      timeout: 3s
      retries: 5

volumes:
  orca_pgdata:
